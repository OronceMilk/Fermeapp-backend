name: Tests FermeApp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fermeapp_test
          POSTGRES_USER: fermeapp_ci
          POSTGRES_PASSWORD: ci_password_temporaire
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-non-sensible-jamais-utilisee-ailleurs
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost"
      DATABASE_URL: "postgres://fermeapp_ci:ci_password_temporaire@localhost:5432/fermeapp_test"

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lancer les migrations (vérification de cohérence)
        run: python manage.py migrate

      - name: Lancer la suite de tests avec couverture
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml

      - name: Vérifier la configuration de déploiement
        run: python manage.py check --deploy
        env:
          DJANGO_DEBUG: "False"