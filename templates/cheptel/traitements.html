{% extends 'base.html' %}

{% block content %}
<div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
        <h2 class="text-3xl font-black text-[#1e3a5f]">Suivi Sanitaire</h2>
        <p class="text-gray-500 text-sm mt-1">Historique des vaccins, traitements et maladies</p>
    </div>
    
    <a href="/cheptel/traitements/add/" 
       class="bg-[#7cb518] hover:bg-[#689914] text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-transform transform active:scale-95 flex items-center gap-2">
        <span>🩺</span> Nouveau Soin / Signalement
    </a>
</div>

<div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
    <form class="grid grid-cols-1 md:grid-cols-3 gap-4"
          hx-get="/cheptel/traitements/" 
          hx-target="#timeline-container" 
          hx-trigger="change"
          hx-indicator="#spinner-sante">
        
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Type d'intervention</label>
            <select name="type" class="w-full bg-gray-50 border border-gray-200 text-[#1e3a5f] rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#7cb518]">
                <option value="">Tous les types</option>
                <option value="VACCIN">💉 Vaccins préventifs</option>
                <option value="TRAITEMENT">💊 Traitements (Médicaments/Plantes)</option>
                <option value="MALADIE">⚠️ Signalements Maladies</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Animal spécifique</label>
            <input type="text" name="identifiant" placeholder="Ex: PO-123..."
                   hx-get="/cheptel/traitements/" 
                   hx-target="#timeline-container" 
                   hx-trigger="keyup changed delay:500ms"
                   class="w-full bg-gray-50 border border-gray-200 text-[#1e3a5f] rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#7cb518]">
        </div>

        <div class="flex items-end">
            <div id="spinner-sante" class="htmx-indicator flex items-center gap-2 text-[#7cb518] font-bold pb-3">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Recherche...
            </div>
        </div>
    </form>
</div>

<div id="timeline-container">
    {% include 'cheptel/partials/traitement_timeline.html' %}
</div>
{% endblock %}
